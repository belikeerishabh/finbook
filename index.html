<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0d0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FinBook — Personal Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flaticon@1.0.0/css/flaticon.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ════════════════════════════════════════════
   DESIGN SYSTEM
════════════════════════════════════════════ */
:root {
  --bg:        #0d0f1a;
  --bg2:       #111422;
  --surface:   #161929;
  --card:      #1c1f32;
  --card2:     #21253a;
  --border:    #262a42;
  --border2:   #2e3350;
  --gold:      #d4a853;
  --gold-lt:   #e8c47a;
  --gold-dim:  rgba(212,168,83,0.12);
  --gold-glow: rgba(212,168,83,0.25);
  --teal:      #4ecdc4;
  --teal-dim:  rgba(78,205,196,0.1);
  --rose:      #e8617a;
  --rose-dim:  rgba(232,97,122,0.1);
  --violet:    #8b7cf8;
  --violet-dim:rgba(139,124,248,0.1);
  --sage:      #7ec8a4;
  --sage-dim:  rgba(126,200,164,0.1);
  --text:      #e8eaf5;
  --text2:     #9da3c4;
  --muted:     #545878;
  --success:   #5dd98c;
  --danger:    #e8617a;
  --r:         16px;
  --r-sm:      10px;
  --r-xs:      7px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  position: relative;
}

/* Ambient background texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 0%, rgba(212,168,83,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(78,205,196,0.03) 0%, transparent 60%),
    radial-gradient(ellipse 40% 80% at 100% 30%, rgba(139,124,248,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ════════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════════ */
.sidebar {
  width: 260px;
  min-width: 260px;
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 10;
  transition: width .35s cubic-bezier(.4,0,.2,1), min-width .35s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}
.sidebar.collapsed { width: 72px; min-width: 72px; }

.sidebar-logo {
  padding: 28px 22px 22px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  overflow: hidden;
  white-space: nowrap;
}
.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--gold), #b8860b);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  box-shadow: 0 4px 20px var(--gold-glow);
}
.logo-text-wrap { overflow: hidden; }
.logo-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.5px;
  line-height: 1;
}
.logo-tagline {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
  margin-top: 3px;
}

.nav-wrap {
  flex: 1;
  padding: 16px 10px;
  overflow-y: auto;
  overflow-x: hidden;
}
.nav-section-label {
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  padding: 12px 14px 5px;
  white-space: nowrap;
  overflow: hidden;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-radius: var(--r-sm);
  cursor: pointer;
  color: var(--text2);
  font-size: 14px;
  font-weight: 500;
  transition: all .2s;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  position: relative;
}
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active {
  background: var(--gold-dim);
  color: var(--gold);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 3px;
  background: var(--gold);
  border-radius: 0 3px 3px 0;
}
.nav-icon {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  transition: all .2s;
}
.nav-item.active .nav-icon { background: rgba(212,168,83,0.15); }
.nav-label-text { overflow: hidden; text-overflow: ellipsis; }

.sidebar-footer {
  padding: 14px 10px;
  border-top: 1px solid var(--border);
}
.collapse-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: var(--r-sm);
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  font-family: 'Outfit', sans-serif;
  font-weight: 500;
  transition: all .2s;
  white-space: nowrap;
  overflow: hidden;
}
.collapse-btn:hover { background: var(--card); color: var(--text); }
.collapse-icon { font-size: 18px; flex-shrink: 0; transition: transform .35s; }
.sidebar.collapsed .collapse-icon { transform: rotate(180deg); }

/* ════════════════════════════════════════════
   MAIN AREA
════════════════════════════════════════════ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* TOPBAR */
.topbar {
  height: 68px;
  padding: 0 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(22,25,41,0.8);
  backdrop-filter: blur(20px);
  flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.page-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.page-subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; font-family: 'JetBrains Mono', monospace; }
.topbar-right { display: flex; gap: 10px; align-items: center; }

/* Mobile hamburger */
.hamburger {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-xs);
  color: var(--text2);
  padding: 8px 10px;
  cursor: pointer;
  font-size: 18px;
}

/* CONTENT */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px;
  position: relative;
}

/* ════════════════════════════════════════════
   STAT CARDS
════════════════════════════════════════════ */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
  transition: transform .2s, box-shadow .2s;
  cursor: default;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
.stat-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
}
.sc-gold::after   { background: linear-gradient(90deg, transparent, var(--gold), transparent); }
.sc-rose::after   { background: linear-gradient(90deg, transparent, var(--rose), transparent); }
.sc-teal::after   { background: linear-gradient(90deg, transparent, var(--teal), transparent); }
.sc-violet::after { background: linear-gradient(90deg, transparent, var(--violet), transparent); }
.sc-sage::after   { background: linear-gradient(90deg, transparent, var(--sage), transparent); }

.stat-bg-icon {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 52px;
  opacity: 0.06;
}
.stat-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 10px;
}
.stat-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px;
  font-weight: 600;
  line-height: 1;
  letter-spacing: -0.5px;
}
.sc-gold   .stat-value { color: var(--gold); }
.sc-rose   .stat-value { color: var(--rose); }
.sc-teal   .stat-value { color: var(--teal); }
.sc-violet .stat-value { color: var(--violet); }
.sc-sage   .stat-value { color: var(--sage); }
.stat-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
}

/* ════════════════════════════════════════════
   TABLE
════════════════════════════════════════════ */
.table-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  margin-bottom: 24px;
}
.table-head {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  background: var(--bg2);
}
.table-head-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}
.table-head-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; min-width: 600px; }
thead tr { background: var(--bg2); }
th {
  padding: 11px 16px;
  text-align: left;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 400;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(38,42,66,0.6);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr { transition: background .15s; }
tbody tr:hover td { background: rgba(255,255,255,0.018); }

.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--muted);
}
.empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.5; }
.empty-title { font-size: 15px; color: var(--text2); font-weight: 500; margin-bottom: 6px; }
.empty-sub { font-size: 12px; }

/* ════════════════════════════════════════════
   BUTTONS
════════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 20px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .2s;
  font-family: 'Outfit', sans-serif;
  white-space: nowrap;
  letter-spacing: 0.2px;
}
.btn-gold {
  background: linear-gradient(135deg, var(--gold), #b8860b);
  color: #0d0f1a;
  box-shadow: 0 4px 16px rgba(212,168,83,0.3);
}
.btn-gold:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,168,83,0.4); filter: brightness(1.05); }
.btn-ghost { background: var(--card2); color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--border); color: var(--text); }
.btn-teal { background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(78,205,196,0.25); }
.btn-teal:hover { background: rgba(78,205,196,0.2); }
.btn-rose { background: var(--rose-dim); color: var(--rose); border: 1px solid rgba(232,97,122,0.25); }
.btn-rose:hover { background: rgba(232,97,122,0.2); }
.btn-violet { background: var(--violet-dim); color: var(--violet); border: 1px solid rgba(139,124,248,0.25); }
.btn-violet:hover { background: rgba(139,124,248,0.2); }
.btn-sm { padding: 7px 14px; font-size: 12px; }
.btn-xs { padding: 5px 11px; font-size: 11px; border-radius: var(--r-xs); }

.icon-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--r-xs);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
  font-size: 14px;
  flex-shrink: 0;
}
.icon-btn:hover { color: var(--text); background: var(--border2); }
.icon-btn.del:hover { color: var(--rose); border-color: rgba(232,97,122,0.3); background: var(--rose-dim); }
.icon-btn.edit:hover { color: var(--gold); border-color: rgba(212,168,83,0.3); background: var(--gold-dim); }

/* ════════════════════════════════════════════
   BADGES
════════════════════════════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
}
.badge-gold   { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(212,168,83,0.2); }
.badge-teal   { background: var(--teal-dim); color: var(--teal); border: 1px solid rgba(78,205,196,0.2); }
.badge-rose   { background: var(--rose-dim); color: var(--rose); border: 1px solid rgba(232,97,122,0.2); }
.badge-violet { background: var(--violet-dim); color: var(--violet); border: 1px solid rgba(139,124,248,0.2); }
.badge-sage   { background: var(--sage-dim); color: var(--sage); border: 1px solid rgba(126,200,164,0.2); }
.badge-paid   { background: rgba(93,217,140,0.1); color: var(--success); border: 1px solid rgba(93,217,140,0.2); }

/* ════════════════════════════════════════════
   MODAL
════════════════════════════════════════════ */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 16px;
}
.overlay.open { display: flex; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 30px;
  width: 600px;
  max-width: 100%;
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(212,168,83,0.05);
  animation: slideUp .25s cubic-bezier(.4,0,.2,1);
  position: relative;
}
.modal.wide { width: 820px; }
.modal.xl   { width: 1020px; }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}
.modal-close {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
}
.modal-close:hover { background: var(--rose-dim); color: var(--rose); border-color: rgba(232,97,122,0.3); }

/* ════════════════════════════════════════════
   FORMS
════════════════════════════════════════════ */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-full { grid-column: 1/-1; }
.form-group { display: flex; flex-direction: column; gap: 7px; }
.form-label {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}
.form-control {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  padding: 10px 14px;
  font-size: 13.5px;
  font-family: 'Outfit', sans-serif;
  outline: none;
  transition: border .2s, box-shadow .2s;
  width: 100%;
}
.form-control:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(212,168,83,0.1);
}
.form-control::placeholder { color: var(--muted); }
select.form-control { cursor: pointer; }
select.form-control option { background: var(--card); }
textarea.form-control { resize: vertical; min-height: 80px; line-height: 1.6; }
.form-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

/* ════════════════════════════════════════════
   AMOUNT DISPLAY
════════════════════════════════════════════ */
.amt { font-family: 'JetBrains Mono', monospace; font-weight: 500; }
.amt-gold  { color: var(--gold); }
.amt-rose  { color: var(--rose); }
.amt-teal  { color: var(--teal); }
.amt-sage  { color: var(--sage); }
.amt-muted { color: var(--text2); }

/* ════════════════════════════════════════════
   CLIENT CARDS
════════════════════════════════════════════ */
.client-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.client-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  cursor: pointer;
  transition: all .22s;
  position: relative;
  overflow: hidden;
}
.client-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,168,83,0.4), transparent);
  opacity: 0;
  transition: opacity .22s;
}
.client-card:hover { border-color: rgba(212,168,83,0.4); transform: translateY(-3px); box-shadow: 0 16px 40px rgba(0,0,0,0.35); }
.client-card:hover::before { opacity: 1; }
.client-avatar {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--gold-dim), rgba(212,168,83,0.05));
  border: 1px solid rgba(212,168,83,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 14px;
}
.client-name { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
.client-meta { font-size: 12px; color: var(--muted); line-height: 1.6; }
.client-actions {
  position: absolute;
  top: 12px; right: 12px;
  display: flex; gap: 5px;
  opacity: 0;
  transition: opacity .2s;
}
.client-card:hover .client-actions { opacity: 1; }

/* ════════════════════════════════════════════
   INVOICE
════════════════════════════════════════════ */
.invoice-list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 22px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--card);
  margin-bottom: 10px;
  cursor: pointer;
  transition: all .2s;
}
.invoice-list-item:hover {
  border-color: rgba(78,205,196,0.35);
  transform: translateX(4px);
  background: var(--card2);
}
.inv-number-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--teal);
  background: var(--teal-dim);
  border: 1px solid rgba(78,205,196,0.2);
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 6px;
  display: inline-block;
}
.inv-client-name { font-size: 15px; font-weight: 600; }

/* ════════════════════════════════════════════
   SETTINGS
════════════════════════════════════════════ */
.settings-card {
  background: var(--card);
  border: 1px solid var(--border);

  padding: 24px;
  margin-bottom: 18px;
}
.settings-card-title {

}

}

/* ════════════════════════════════════════════
   BACK BUTTON
════════════════════════════════════════════ */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 20px;
  padding: 6px 0;
  transition: color .2s;
  font-weight: 500;
}
.back-link:hover { color: var(--gold); }

/* ════════════════════════════════════════════
   TOAST
════════════════════════════════════════════ */
.toast-wrap {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  padding: 13px 18px;
  font-size: 13.5px;
  color: var(--text);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  gap: 10px;
  animation: toastIn .3s cubic-bezier(.4,0,.2,1);
  pointer-events: all;
  min-width: 260px;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error   { border-left: 3px solid var(--rose); }
@keyframes toastIn {
  from { transform: translateX(110%); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
@keyframes toastOut {
  from { transform: translateX(0); opacity: 1; }
  to   { transform: translateX(110%); opacity: 0; }
}

/* ════════════════════════════════════════════
   LOADING
════════════════════════════════════════════ */
.loading-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  gap: 16px;
  color: var(--muted);
  font-size: 13px;
}
.spinner {
  width: 36px; height: 36px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ════════════════════════════════════════════
   SCROLLBAR
════════════════════════════════════════════ */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ════════════════════════════════════════════

════════════════════════════════════════════ */
.date-cell {

}

/* ════════════════════════════════════════════

════════════════════════════════════════════ */
.status-select {

  border-radius: 20px;

  font-weight: 600;

}

}

.work-check-item {

}

/* ════════════════════════════════════════════
   MOBILE DRAWER OVERLAY
════════════════════════════════════════════ */
.mobile-overlay {

  position: fixed;
  inset: 0;

}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(10px); }

}

<!-- SIDEBAR -->

<!-- MAIN -->

<!-- TOAST -->

<script>
/* ═══════════════════════════════════════════
   SUPABASE INIT
═══════════════════════════════════════════ */
const SUPA_URL = 'https://ikaixiofmfisazzerltp.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlrYWl4aW9mbWZpc2F6emVybHRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTg5NzcsImV4cCI6MjA4OTg5NDk3N30.ttJ-Lyld--CeXhOnnqQc8R957yUaLqt_7iVwTrdHVoo';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let currentPage = 'dashboard';
let selectedClient = null;
let APP = { banks: [], profile: {} };

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
const fmt = n => '₹' + (parseFloat(n)||0).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
const today = () => new Date().toISOString().split('T')[0];
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const initials = name => name ? name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : '?';

function toast(msg, type='success') {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type==='success'?'✅':'❌'}</span><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => { el.style.animation = 'toastOut .3s ease forwards'; setTimeout(()=>el.remove(), 300); }, 3200);
}

function openModal(html, size='') {
  const box = document.getElementById('modal-box');
  box.className = 'modal' + (size ? ' '+size : '');
  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function handleOverlayClick(e) { if(e.target===document.getElementById('overlay')) closeModal(); }

function setContent(html) {
  const el = document.getElementById('content');
  el.innerHTML = `<div class="page-enter">${html}</div>`;
}

/* ═══════════════════════════════════════════
   SIDEBAR TOGGLE
═══════════════════════════════════════════ */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}
function openMobileSidebar() {
  document.getElementById('sidebar').classList.add('mobile-open');
  document.getElementById('mobile-overlay').classList.add('show');
}
function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('mobile-overlay').classList.remove('show');
}

/* ═══════════════════════════════════════════
   SETTINGS LOAD
═══════════════════════════════════════════ */
async function loadSettings() {
  const {data} = await sb.from('settings').select('*');
  (data||[]).forEach(r => { APP[r.key] = r.value; });
  if(!Array.isArray(APP.banks)) APP.banks = [];
  if(!APP.profile || typeof APP.profile !== 'object') APP.profile = {};
}
async function saveSetting(key, value) {
  APP[key] = value;
  await sb.from('settings').upsert({key, value},{onConflict:'key'});
}
function bankOpts(sel='') {
  if(!APP.banks.length) return '<option value="">— No banks added —</option>';
  return APP.banks.map(b=>`<option value="${b.name}" ${sel===b.name?'selected':''}>${b.name}</option>`).join('');
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
const PAGE_META = {
  dashboard:   {title:'Dashboard',     sub:'Your financial overview'},
  income:      {title:'Income',        sub:'Money coming in'},
  expenses:    {title:'Expenses',      sub:'Money going out'},
  investments: {title:'Investments',   sub:'Your portfolio & savings'},
  clients:     {title:'Clients & Work',sub:'Manage clients and work entries'},
  invoices:    {title:'Invoices',      sub:'All generated invoices'},
  settings:    {title:'Settings',      sub:'Profile, banks & preferences'},
};

async function navigate(page) {
  currentPage = page;
  selectedClient = null;
  closeMobileSidebar();
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page===page));
  const meta = PAGE_META[page]||{title:page,sub:''};
  document.getElementById('page-title').textContent = meta.title;
  document.getElementById('page-subtitle').textContent = meta.sub;
  document.getElementById('topbar-actions').innerHTML = '';
  setContent('<div class="loading-wrap"><div class="spinner"></div><span>Loading…</span></div>');
  await loadSettings();
  const fns = {dashboard:pgDashboard,income:pgIncome,expenses:pgExpenses,investments:pgInvestments,clients:pgClients,invoices:pgInvoices,settings:pgSettings};
  if(fns[page]) await fns[page]();
}

/* ═══════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════ */
async function pgDashboard() {
  const now = new Date();
  const mStart = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  const [ri,re,inv,cl] = await Promise.all([
    sb.from('income').select('amount,date'),
    sb.from('expenses').select('amount,date'),
    sb.from('investments').select('amount,type'),
    sb.from('clients').select('id'),
  ]);
  const totInc  = (ri.data||[]).reduce((s,r)=>s+parseFloat(r.amount||0),0);
  const totExp  = (re.data||[]).reduce((s,r)=>s+parseFloat(r.amount||0),0);
  const totInv  = (inv.data||[]).filter(r=>r.type==='investment').reduce((s,r)=>s+parseFloat(r.amount||0),0);
  const totWith = (inv.data||[]).filter(r=>r.type==='withdrawal').reduce((s,r)=>s+parseFloat(r.amount||0),0);
  const mInc    = (ri.data||[]).filter(r=>r.date>=mStart).reduce((s,r)=>s+parseFloat(r.amount||0),0);
  const mExp    = (re.data||[]).filter(r=>r.date>=mStart).reduce((s,r)=>s+parseFloat(r.amount||0),0);
  const balance = totInc - totExp;

  setContent(`
    <div class="stat-grid">
      <div class="stat-card sc-gold">
        <div class="stat-bg-icon">💰</div>
        <div class="stat-label">Total Income</div>
        <div class="stat-value">${fmt(totInc)}</div>
        <div class="stat-sub">This month: ${fmt(mInc)}</div>
      </div>
      <div class="stat-card sc-rose">
        <div class="stat-bg-icon">💸</div>
        <div class="stat-label">Total Expenses</div>
        <div class="stat-value">${fmt(totExp)}</div>
        <div class="stat-sub">This month: ${fmt(mExp)}</div>
      </div>
      <div class="stat-card sc-teal">
        <div class="stat-bg-icon">⚖️</div>
        <div class="stat-label">Net Balance</div>
        <div class="stat-value">${fmt(balance)}</div>
        <div class="stat-sub">Income − Expenses</div>
      </div>
      <div class="stat-card sc-violet">
        <div class="stat-bg-icon">📈</div>
        <div class="stat-label">Net Invested</div>
        <div class="stat-value">${fmt(totInv-totWith)}</div>
        <div class="stat-sub">Invested: ${fmt(totInv)}</div>
      </div>
      <div class="stat-card sc-sage">
        <div class="stat-bg-icon">👥</div>
        <div class="stat-label">Active Clients</div>
        <div class="stat-value">${(cl.data||[]).length}</div>
        <div class="stat-sub">Total clients</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div class="table-card">
        <div class="table-head"><div class="table-head-title">💰 Recent Income</div></div>
        <div class="table-scroll" id="dash-inc"></div>
      </div>
      <div class="table-card">
        <div class="table-head"><div class="table-head-title">💸 Recent Expenses</div></div>
        <div class="table-scroll" id="dash-exp"></div>
      </div>
    </div>
  `);

  const [rri,rre] = await Promise.all([
    sb.from('income').select('*').order('date',{ascending:false}).limit(6),
    sb.from('expenses').select('*').order('date',{ascending:false}).limit(6),
  ]);
  document.getElementById('dash-inc').innerHTML = miniTable(rri.data||[], 'income');
  document.getElementById('dash-exp').innerHTML = miniTable(rre.data||[], 'expense');
}

function miniTable(rows, type) {
  if(!rows.length) return `<div class="empty-state"><div class="empty-icon">${type==='income'?'💰':'💸'}</div><div class="empty-title">No records yet</div></div>`;
  const isInc = type==='income';
  return `<table><tbody>${rows.map(r=>`<tr>
    <td class="date-cell">${fmtDate(r.date)}</td>
    <td style="font-weight:600">${isInc ? r.source||'—' : r.description||'—'}</td>
    <td><span class="badge ${isInc?'badge-gold':'badge-rose'}">${r.category||'—'}</span></td>
    <td class="amt ${isInc?'amt-gold':'amt-rose'}">${fmt(r.amount)}</td>
  </tr>`).join('')}</tbody></table>`;
}

/* ═══════════════════════════════════════════
   INCOME
═══════════════════════════════════════════ */
async function pgIncome() {
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-gold" onclick="openIncomeModal()">+ Add Income</button>`;
  await renderIncomeTable();
}

async function renderIncomeTable() {
  const {data} = await sb.from('income').select('*').order('date',{ascending:false});
  const rows = data||[];
  const total = rows.reduce((s,r)=>s+parseFloat(r.amount||0),0);
  setContent(`

      <div class="form-group form-full"><div class="form-label">Address</div><textarea class="form-control" id="f-addr" placeholder="Client address…">${c.address||''}</textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveClient('${c.id||''}')">💾 ${edit?'Update':'Save'} Client</button>
    </div>`);
}

async function saveClient(id) {
  const p = {
    name: document.getElementById('f-name').value,
    email: document.getElementById('f-email').value,
    phone: document.getElementById('f-phone').value,
    address: document.getElementById('f-addr').value,
  };
  if(!p.name) return toast('Client name is required','error');
  const {error} = id ? await sb.from('clients').update(p).eq('id',id) : await sb.from('clients').insert(p);
  if(error) return toast(error.message,'error');
  toast(id?'Client updated ✓':'Client added ✓');
  closeModal();
  if(selectedClient) await renderWork(selectedClient); else await renderClientList();
}

function openWorkModal(clientId, r={}) {
  const edit = !!r.id;
  openModal(`
    <div class="modal-header">
      <div class="modal-title">🛠️ ${edit?'Edit':'Add'} Work Entry</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><div class="form-label">Date</div><input class="form-control" type="date" id="f-date" value="${r.date||today()}"></div>
      <div class="form-group"><div class="form-label">Rate / Price per Unit (₹)</div><input class="form-control" type="number" id="f-price" placeholder="0.00" value="${r.price||''}"></div>
      <div class="form-group form-full"><div class="form-label">Work Details *</div><input class="form-control" type="text" id="f-details" placeholder="Describe the work done…" value="${r.work_details||''}"></div>
      <div class="form-group"><div class="form-label">Quantity</div><input class="form-control" type="number" id="f-qty" placeholder="1" value="${r.quantity||1}" min="1" step="0.01"></div>
      <div class="form-group"><div class="form-label">Payment Bank</div><select class="form-control" id="f-bank"><option value="">Select bank</option>${bankOpts(r.bank)}</select></div>
      <div class="form-group form-full"><div class="form-label">Notes</div><textarea class="form-control" id="f-notes" placeholder="Any additional notes…">${r.notes||''}</textarea></div>

      <button class="btn btn-gold" onclick="saveWork('${clientId}','${r.id||''}')">💾 ${edit?'Update':'Save'} Work</button>
    </div>`);
}

async function saveWork(clientId, id) {
  const p = {
    client_id: clientId,
    date: document.getElementById('f-date').value,
    work_details: document.getElementById('f-details').value,
    quantity: parseFloat(document.getElementById('f-qty').value)||1,
    price: parseFloat(document.getElementById('f-price').value)||0,
    bank: document.getElementById('f-bank').value,
    notes: document.getElementById('f-notes').value,
  };
  if(!p.date||!p.work_details) return toast('Date and work details required','error');
  const {error} = id ? await sb.from('work_entries').update(p).eq('id',id) : await sb.from('work_entries').insert(p);
  if(error) return toast(error.message,'error');
  toast(id?'Work updated ✓':'Work added ✓');
  closeModal();
  await renderWork(selectedClient);
}

/* ═══════════════════════════════════════════
   INVOICE CREATOR
═══════════════════════════════════════════ */
async function openInvoiceCreator(clientId) {
  const {data: client} = await sb.from('clients').select('*').eq('id',clientId).single();
  const {data: works}  = await sb.from('work_entries').select('*').eq('client_id',clientId).is('invoice_number',null).order('date',{ascending:false});
  const uninvoiced = works||[];

  openModal(`
    <div class="modal-header">
      <div class="modal-title">🧾 Create Invoice — ${client.name}</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    ${uninvoiced.length ? `
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px;">Select work items to include in this invoice:</p>
      <div id="work-checks" style="max-height:340px;overflow-y:auto;">
        ${uninvoiced.map(w=>`
          <label class="work-check-item">
            <input type="checkbox" value="${w.id}">
            <div class="work-check-details">
              <div class="work-check-title">${w.work_details}</div>
              <div class="work-check-meta">${fmtDate(w.date)} · Qty: ${w.quantity} × ${fmt(w.price)} = <strong style="color:var(--gold)">${fmt(w.price*w.quantity)}</strong></div>
            </div>
          </label>`).join('')}
      </div>
      <div class="form-group" style="margin-top:16px;">
        <div class="form-label">Invoice Notes (optional)</div>
        <textarea class="form-control" id="inv-notes" placeholder="Payment terms, thank you note…"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-gold" onclick="generateInvoice('${clientId}')">🧾 Generate Invoice</button>
      </div>` :
      `<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">All work is already invoiced</div><div class="empty-sub">Add new work entries first</div></div>
      <div class="form-actions"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>`}
  `, 'wide');
}

async function generateInvoice(clientId) {
  const checked = [...document.querySelectorAll('#work-checks input:checked')].map(el=>el.value);
  if(!checked.length) return toast('Select at least one work entry','error');
  const notes = document.getElementById('inv-notes').value;

  const {data: client} = await sb.from('clients').select('*').eq('id',clientId).single();
  const {data: works}  = await sb.from('work_entries').select('*').in('id',checked);

  // Invoice number: INV + YY + MM + seq
  const now = new Date();
  const yy  = String(now.getFullYear()).slice(2);
  const mm  = String(now.getMonth()+1).padStart(2,'0');
  const prefix = `INV${yy}${mm}`;
  const {data: existing} = await sb.from('invoices').select('invoice_number').like('invoice_number',`${prefix}%`);
  const seq  = String((existing||[]).length+1).padStart(2,'0');
  const invN = `${prefix}${seq}`;

  const lines = (works||[]).map(w=>({description:w.work_details,date:w.date,quantity:w.quantity,price:w.price,total:w.price*w.quantity}));
  const subtotal = lines.reduce((s,l)=>s+l.total,0);

  const {error} = await sb.from('invoices').insert({invoice_number:invN,client_id:clientId,client_name:client.name,work_entry_ids:checked,line_items:lines,subtotal,total:subtotal,notes});
  if(error) return toast(error.message,'error');

  await sb.from('work_entries').update({invoice_number:invN}).in('id',checked);
  toast(`Invoice ${invN} created! 🎉`);
  closeModal();
  await showInvoice(invN);
  if(selectedClient) await renderWork(selectedClient);
}

async function showInvoice(invNum) {
  const {data: inv} = await sb.from('invoices').select('*').eq('invoice_number',invNum).single();
  const prof = APP.profile||{};
  const lines = inv.line_items||[];

  openModal(`
    <div class="modal-header">
      <div class="modal-title">🧾 ${inv.invoice_number}</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="invoice-preview" id="inv-printable">
      <div class="inv-p-header">
        <div>
          <div class="inv-p-logo">FinBook</div>
          <div class="inv-p-num">${inv.invoice_number}</div>
          <div class="inv-p-date">${fmtDate(inv.created_at)}</div>
        </div>
        <div class="inv-p-from">
          <strong>${prof.name||'Your Name'}</strong>
          ${prof.email||''}<br>
          ${prof.phone||''}<br>
          ${prof.upi?'UPI: '+prof.upi:''}
        </div>
      </div>
      <div class="inv-p-to-box">
        <div class="inv-p-to-label">Billed To</div>
        <div class="inv-p-to-name">${inv.client_name}</div>
      </div>
      <table class="inv-p-table">
        <thead><tr><th>#</th><th>Description</th><th>Date</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>
        <tbody>${lines.map((l,i)=>`<tr>
          <td>${i+1}</td>
          <td style="font-weight:600">${l.description}</td>

          <td>${l.quantity}</td>

        </tr>`).join('')}</tbody>

      <div class="inv-p-total-section">

      ${inv.notes?`<div style="margin-top:20px;padding:14px;background:#f8f6f0;border-radius:8px;font-size:12px;color:#666"><strong>Notes:</strong> ${inv.notes}</div>`:''}
      <div class="inv-p-footer">Thank you for your business!</div>

    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      <button class="btn btn-gold" onclick="printInv()">🖨️ Print / Save PDF</button>
    </div>`, 'wide');
}

      .inv-p-to-name{font-size:17px;font-weight:700;}
      table{width:100%;border-collapse:collapse;}

      td{padding:11px 14px;border-bottom:1px solid #eee;}

    </div>`);

    <div class="settings-card">
      <div class="settings-card-title">👤 Your Profile</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:18px;margin-top:-8px;">This information appears on your invoices</p>
      <div class="form-grid">
        <div class="form-group"><div class="form-label">Your Name / Business Name</div><input class="form-control" type="text" id="s-name" value="${prof.name||''}" placeholder="Rishabh Sacheti"></div>
        <div class="form-group"><div class="form-label">Email</div><input class="form-control" type="email" id="s-email" value="${prof.email||''}" placeholder="you@email.com"></div>
        <div class="form-group"><div class="form-label">Phone</div><input class="form-control" type="tel" id="s-phone" value="${prof.phone||''}" placeholder="+91 98765 43210"></div>
        <div class="form-group"><div class="form-label">UPI ID</div><input class="form-control" type="text" id="s-upi" value="${prof.upi||''}" placeholder="yourname@upi"></div>
        <div class="form-group form-full"><div class="form-label">Address</div><textarea class="form-control" id="s-addr" placeholder="Your address…">${prof.address||''}</textarea></div>
      </div>
      <div style="margin-top:16px;"><button class="btn btn-gold" onclick="saveProfile()">💾 Save Profile</button></div>
    </div>

    <div class="settings-card">
      <div class="settings-card-title">🏦 Bank Accounts</div>
      <div id="bank-list">
        ${banks.length ? banks.map((b,i)=>`
          <div class="bank-row">
            <div class="bank-row-info">
              <div class="bank-icon-wrap">🏦</div>
              <div><div class="bank-name">${b.name}</div><div class="bank-type">${b.type||'Bank Account'}</div></div>
            </div>
            <button class="icon-btn del" onclick="removeBank(${i})">🗑️</button>
          </div>`).join('') : `<p style="color:var(--muted);font-size:13px;margin-bottom:14px;">No bank accounts added yet.</p>`}
      </div>
      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">
        <input class="form-control" type="text" id="new-bank-name" placeholder="Bank name (e.g. HDFC Savings)" style="flex:1;min-width:200px">
        <input class="form-control" type="text" id="new-bank-type" placeholder="Type (Savings / Current)" style="flex:1;min-width:180px">
        <button class="btn btn-gold" onclick="addBank()">+ Add Bank</button>

    </div>

      <div class="settings-card-title">ℹ️ About FinBook</div>
      <p style="font-size:13px;color:var(--muted);line-height:1.8">FinBook stores all your data securely on <strong style="color:var(--text2)">Supabase</strong> cloud. Your data syncs across all devices in real-time. Built with care for freelancers and individuals who want simple, elegant finance tracking.</p>

async function saveProfile() {
  const p = {
    name: document.getElementById('s-name').value,
    email: document.getElementById('s-email').value,
    phone: document.getElementById('s-phone').value,
    upi: document.getElementById('s-upi').value,
    address: document.getElementById('s-addr').value,
  };
  await saveSetting('profile', p);
  toast('Profile saved ✓');
}

async function addBank() {
  const name = document.getElementById('new-bank-name').value.trim();
  const type = document.getElementById('new-bank-type').value.trim();
  if(!name) return toast('Enter a bank name','error');
  const banks = [...(APP.banks||[])];
  banks.push({name,type});
  await saveSetting('banks', banks);
  toast('Bank added ✓');
  await pgSettings();
}

async function removeBank(idx) {
  if(!confirm('Remove this bank account?')) return;
  const banks = [...(APP.banks||[])];
  banks.splice(idx,1);
  await saveSetting('banks', banks);
  toast('Bank removed');
  await pgSettings();
}

/* ═══════════════════════════════════════════
   DELETE
═══════════════════════════════════════════ */
async function delRecord(table, id, cb) {
  if(!confirm('Delete this record? This cannot be undone.')) return;
  const {error} = await sb.from(table).delete().eq('id',id);
  if(error) return toast(error.message,'error');
  toast('Deleted ✓');
  if(typeof cb === 'function') await cb();
}

   INIT

(async () => {
  await loadSettings();
  await pgDashboard();
